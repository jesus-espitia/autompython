<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>PAMaap - Inicio de Seccion</title>
    <link rel="stylesheet" href="../Static/css/register_login.css">
    <link rel="stylesheet" href="../Static/css/styles.css">
    <link rel="icon" href="../Static/img/Logo.png">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/register_login.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='img/Logo.png') }}">
</head>

<body>

    <h2>Iniciar Sesión</h2>

    <form method="POST" action="{{ url_for('login') }}">

        <label>Correo Electrónico</label>
        <input type="email" name="email" required>

        <br><br>

        <label>Contraseña</label>
        <input type="password" name="password" required>

        <br><br>

        <button type="submit">Ingresar</button>

    </form>

    <p>¿No tienes cuenta?
        <a href="{{ url_for('register') }}">Regístrate aquí</a>
    </p>

    {% if message %}
    <p style="color:red;">{{ message }}</p>
    {% endif %}

</body>

</html>
