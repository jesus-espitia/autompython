<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - PAMaap</title>
    <link rel="stylesheet" href="../Static/css/styles.css">
    <!-- O usa tu ruta de Flask: <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}"> -->
</head>
<body class="auth-body">

    <div class="auth-container">
        <div class="auth-box">
            <!-- Logo y Título -->
            <div class="auth-header">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/>
                    </svg>
                </div>
                <h1 class="auth-title">Crear Cuenta</h1>
                <p class="auth-subtitle">Únete a la plataforma PAMaap</p>
            </div>

            <!-- Formulario -->
            <form action="#" method="POST" class="auth-form">
                <div class="input-group">
                    <label for="fullname">Nombre Completo</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Ej: Juan Pérez" required>
                </div>

                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="usuario@ejemplo.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required>
                </div>

                <div class="input-group">
                    <label for="confirm_password">Confirmar Contraseña</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Repite tu contraseña" required>
                </div>

                <button type="submit" class="auth-btn">Registrarse</button>
            </form>

            <!-- Pie del formulario -->
            <div class="auth-footer">
                <p>¿Ya tienes cuenta? <a href="login.html">Inicia Sesión</a></p>
            </div>
        </div>
    </div>

    <script src="../Static/js/script.js"></script>
</body>
</html>
