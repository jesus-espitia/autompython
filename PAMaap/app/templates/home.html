<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAMaap - Home</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/logout.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='img/Logo.png') }}">
</head>

<body>

    <!-- Barra Lateral (Sidebar) -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon">
                <!-- Icono SVG nativo -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2" />
                </svg>
            </div>
            <span class="logo-text">PAMaap</span>
        </div>

        <div class="user-section">
            <div class="user-avatar">PP</div>
            <div class="user-info">
                <span class="user-name">{{ session["user"]["fullname"] }}</span>
                <span class="user-role">Usuario Activo</span>
            </div>
        </div>

        <nav class="nav-section">
            <span class="nav-label">Menu Principal</span>

            <a href="/home" class="nav-item active">
                <!-- Portal (Home moderno) -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M3 10.5L12 3l9 7.5"></path>
                    <path d="M5 10v10h14V10"></path>
                </svg>
                <span>Portal</span>
            </a>

            <a href="/mi_ficha" class="nav-item">
                <!-- Mi ficha (Usuario más limpio) -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="8" r="4"></circle>
                    <path d="M4 21c1.5-4 5-6 8-6s6.5 2 8 6"></path>
                </svg>
                <span>Mi ficha</span>
            </a>

            <a href="/documentos" class="nav-item">
                <!-- Documentos (Archivo con líneas) -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="9" y1="13" x2="15" y2="13"></line>
                    <line x1="9" y1="17" x2="15" y2="17"></line>
                </svg>
                <span>Documentos</span>
            </a>

            <a href="/funciones" class="nav-item">
                <!-- Funciones (Gráfica matemática mejorada) -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="3" y1="20" x2="21" y2="20"></line>
                    <line x1="4" y1="3" x2="4" y2="21"></line>
                    <path d="M4 16 C8 6, 16 6, 20 14"></path>
                </svg>
                <span>Funciones</span>
            </a>

            <a href="/configuracion" class="nav-item">
                <!-- Configuración (Engranaje más estético) -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.2a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.2a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h0A1.7 1.7 0 0 0 10 3.2V3a2 2 0 1 1 4 0v.2a1.7 1.7 0 0 0 1 1.5h0a1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v0a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.2a1.7 1.7 0 0 0-1.4 1z">
                    </path>
                </svg>
                <span>Configuracion</span>
            </a>
        </nav>
    </aside>

    <!-- Contenido Principal -->
    <main class="main-content" id="mainContent">

        <!-- Encabezado Superior -->
        <header class="header">
            <button class="toggle-btn" id="toggleBtn" aria-label="Toggle Menu">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg>
            </button>

            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <input type="text" placeholder="Buscar en el portal...">
            </div>

            <div class="header-right">
                <button class="header-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                    </svg>
                    <span class="notification-dot"></span>
                </button>

                <div class="header-user">
                    <div class="header-user-avatar">PP</div>
                    <!-- Toggle del dropdown -->
                    <span id="userNameToggle" class="user-name">{{ session["user"]["fullname"] }}</span>

                    <!-- Dropdown oculto -->
                    <div id="userDropdown" class="user-dropdown">
                        <a href="{{ url_for('logout') }}">Cerrar sesión</a>
                    </div>
                </div>
            </div>
        </header>

        <!-- Cuerpo de la Página -->
        <div class="content-area">
            <h1 class="page-title">Bienvenido, {{ session["user"]["fullname"] }}</h1>
            <p class="page-subtitle">Panel de control y acceso rapido a tus herramientas.</p>

            <!-- Módulo de Imagen (Simulación del "img" de la captura) -->
            <div class="image-module">
                <div class="image-placeholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <circle cx="8.5" cy="8.5" r="1.5" />
                        <polyline points="21 15 16 10 5 21" />
                    </svg>
                    <span>img</span>
                </div>
            </div>


        </div>
    </main>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script src="{{ url_for('static', filename='js/logout.js') }}"></script>

</body>

</html>
